services:
  # ── Backend: FastAPI + SPA estático + SQLite ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8000"
    environment:
      - SERVE_STATIC=true
      - STATIC_DIR=/app/static
      - DATABASE_URL=sqlite+aiosqlite:///./data/turbolog.db
    volumes:
      - ./backend/.env:/app/.env:ro
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  backend-data:
