services:
  # ── Backend: FastAPI + SPA estático (PostgreSQL externo vía .env) ────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8000"
    environment:
      - SERVE_STATIC=true
      - STATIC_DIR=/app/static
    volumes:
      - ./backend/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Scheduler: procesos programados (recordatorios, auditorías, ...) ──
  # Reutiliza la misma imagen del backend; solo cambia el comando. El reloj
  # (APScheduler) vive aquí, desacoplado del server web. Añadir procesos
  # futuros = sumar un JobSpec en backend/app/jobs/registry.py.
  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # The image entrypoint owns the RUN_MIGRATIONS gate (default runs alembic,
    # preserving the dev boot). The command is just the scheduler module, passed
    # as args to the entrypoint's `exec "$@"`.
    command: ["uv", "run", "python", "-m", "app.scheduler_runner"]
    volumes:
      - ./backend/.env:/app/.env:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
