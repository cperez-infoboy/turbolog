# ============================================================================
# Turbolog — CI/CD pipeline (deploy to GCP Docker Swarm)
# ============================================================================
# Triggers:
#   push (main)         full deploy: lint-test -> additive-gate -> build-push
#                       -> precondition-check -> deploy
#   pull_request        lint-test only (NO build, NO deploy)
#   workflow_dispatch   manual. With `image_tag` input set -> ROLLBACK to that
#                       SHA (skips build-push + additive-gate; runs
#                       precondition-check + deploy with the supplied tag).
#                       Without `image_tag` -> build + deploy HEAD of the branch.
#
# Deployment transport: GitHub Actions -> WIF -> gcloud -> IAP-tunnel SSH to the
# (private-IP) Swarm manager -> docker stack deploy / service update. The image
# is pushed SHA-tagged to Artifact Registry; `:latest` is NEVER used by any
# operational path (build, deploy, or rollback).
#
# Required GitHub configuration (Settings -> Secrets and variables -> Actions):
#
#   SECRETS (sensitive):
#     GCP_WIF_PROVIDER     - WIF workload identity provider fully-qualified name
#                            (projects/<n>/locations/global/workloadIdentityPools/.../providers/...)
#     GCP_SERVICE_ACCOUNT  - GCP service account impersonated by WIF (must carry
#                            the FULL role set: iam.workloadIdentityUser,
#                            artifactregistry.writer, compute.osAdminLogin,
#                            iap.tunnelResourceAccessor, iam.serviceAccountUser)
#
#   VARIABLES (non-secret config):
#     GCP_PROJECT_ID          - dockerswarm-491114
#     GCP_ZONE                - southamerica-west1-a
#     GAR_REGION              - southamerica-west1
#     GAR_REPO                - turbolog (Artifact Registry repository name)
#     SWARM_MANAGER_NODE      - GCE instance name of the Swarm manager
#     CLOUDSQL_CONNECTION     - <proj>:<region>:<inst> Cloud SQL connection name
#     APP_DOMAIN              - public Cloudflare domain (post-deploy smoke)
#
#   NOTE on GAR_REPO / ARTIFACT_REGISTRY_REPO: the image path component (the GAR
#   repository) is a single value, standardized here as the variable GAR_REPO
#   (= "turbolog"). docker-stack.yml.tmpl already hardcodes the full image path
#   southamerica-west1-docker.pkg.dev/dockerswarm-491114/turbolog/turbolog — CI
#   composes the same path from GAR_REGION + GCP_PROJECT_ID + GAR_REPO.
#
# Secrets bootstrap (8 external _v1 Swarm secrets) is a one-time operator task;
# see scripts/create-secrets.sh and docs/deploy-runbook.md.
# ============================================================================
name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "SHA tag to roll back to (leave empty to build + deploy HEAD)"
        required: false
        default: ""
        type: string

# Never cancel a running deploy to the same ref — overlapping deploys race on
# `docker stack deploy` / service update. Queuing is safer than cancellation.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# WIF needs id-token: write. GAR push auth comes from gcloud (not GITHUB_TOKEN),
# so packages: write is NOT required. contents: read for checkout.
permissions:
  contents: read
  id-token: write

env:
  # Composed once; the GAR repo path matches docker-stack.yml.tmpl.
  IMAGE_BASE: ${{ vars.GAR_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/turbolog

jobs:
  # ---------------------------------------------------------------------------
  # 1. lint-test — always runs (push, PR, dispatch). Gate for every other job.
  # ---------------------------------------------------------------------------
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run tests
        working-directory: backend
        run: uv run pytest -q

  # ---------------------------------------------------------------------------
  # 2. additive-migration-gate — push-to-main OR manual dispatch (no image_tag).
  #    PRs and rollback dispatches skip it.
  #    (i)  upgrade()-scoped static op-scan (AUTHORITY for additivity).
  #    (ii) upgrade -> downgrade -1 -> upgrade round-trip on scratch sqlite,
  #         seeded with NULL rows for defense-in-depth.
  # ---------------------------------------------------------------------------
  additive-migration-gate:
    needs: lint-test
    if: >-
      ${{
        !cancelled()
        && (
          github.event_name == 'push'
          || (github.event_name == 'workflow_dispatch' && inputs.image_tag == '')
        )
      }}
    runs-on: ubuntu-latest
    # Reversibility MUST be tested on the SAME engine as prod (Postgres). The
    # existing chain uses PG-specific SQL (now()::text, md5()) that sqlite
    # cannot parse, so sqlite is the WRONG engine for this gate. The service
    # container is the scratch DB; the job is ephemeral so no cleanup is needed.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: turbolog
          POSTGRES_PASSWORD: turbolog
          POSTGRES_DB: turbolog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turbolog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://turbolog:turbolog@localhost:5432/turbolog
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Static op-scan (additivity authority, baseline c1d2e3f4a5b6)
        run: python scripts/check_migrations.py

      - name: Reversibility round-trip (Postgres, NULL-seeded)
        working-directory: backend
        run: |
          set -euo pipefail
          uv run alembic upgrade head
          uv run python ../scripts/seed_scratch_nulls.py
          uv run alembic downgrade -1
          uv run alembic upgrade head
          echo "round-trip OK (upgrade -> seed NULLs -> downgrade -1 -> upgrade)"

  # ---------------------------------------------------------------------------
  # 3. build-push — build the image, tag it short-SHA, push to GAR via WIF.
  #    Same trigger conditions as the additive-gate. Skipped on rollback.
  # ---------------------------------------------------------------------------
  build-push:
    needs: additive-migration-gate
    if: >-
      ${{
        !cancelled()
        && needs.additive-migration-gate.result == 'success'
        && (
          github.event_name == 'push'
          || (github.event_name == 'workflow_dispatch' && inputs.image_tag == '')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag (short SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GAR_REGION }}-docker.pkg.dev"

      - name: Build image
        run: |
          IMAGE="${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          echo "Building $IMAGE"
          docker build -f backend/Dockerfile -t "$IMAGE" .

      - name: Push image (SHA-tagged, never :latest)
        run: |
          IMAGE="${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          docker push "$IMAGE"
          echo "Pushed $IMAGE"

  # ---------------------------------------------------------------------------
  # 4. precondition-check — verify swarm nodes can pull. Runs on push AND on
  #    rollback dispatch (node scope/role drift can break a rollback too).
  #    Hard-fails with a clear message if `cloud-platform` scope or
  #    `roles/artifactregistry.reader` is missing.
  # ---------------------------------------------------------------------------
  precondition-check:
    needs: [lint-test, build-push]
    if: >-
      ${{
        always()
        && needs.lint-test.result == 'success'
        && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
        && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      }}
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Generate and register CI SSH key (OS Login)
        env:
          RUNTIME_DIR: ${{ runner.temp }}
        run: |
          ssh-keygen -t rsa -N "" -f "$RUNTIME_DIR/gcp_ssh_key" -q
          gcloud compute os-login ssh-keys add --key-file="$RUNTIME_DIR/gcp_ssh_key.pub" || true

      - name: Verify node access scopes and Artifact Registry reader
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ vars.GCP_ZONE }}
          SWARM_MANAGER_NODE: ${{ vars.SWARM_MANAGER_NODE }}
          RUNTIME_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          SSH_OPTS=(--tunnel-through-iap --zone="$GCP_ZONE"
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key"
            --ssh-flag="-o StrictHostKeyChecking=no"
            --ssh-flag="-o UserKnownHostsFile=/dev/null")

          # Authoritative node list from the manager (hostnames assumed to equal
          # GCE instance names — standard for GCE Swarm nodes).
          NODES=$(gcloud compute ssh "$SWARM_MANAGER_NODE" "${SSH_OPTS[@]}" \
            -- "docker node ls --format '{{.Hostname}}'" | tr -d '\r')
          echo "Swarm nodes:"; echo "$NODES"

          MISSING_SCOPE=0
          MISSING_ROLE=0
          declare -A checked_sa
          for node in $NODES; do
            SCOPES=$(gcloud compute instances describe "$node" --zone="$GCP_ZONE" \
              --format='value(serviceAccounts[0].scopes.list())' 2>/dev/null || echo "")
            if ! echo "$SCOPES" | grep -q 'cloud-platform'; then
              echo "::error::Node '$node' lacks the 'cloud-platform' access scope. Scope is set at VM creation time — set-service-account CANNOT add cloud-platform after creation, so the node MUST be recreated."
              MISSING_SCOPE=1
            fi

            SA=$(gcloud compute instances describe "$node" --zone="$GCP_ZONE" \
              --format='value(serviceAccounts[0].email)' 2>/dev/null || echo "")
            if [ -z "$SA" ]; then
              echo "::error::Node '$node' has no service account attached."
              MISSING_ROLE=1
              continue
            fi
            if [ -z "${checked_sa[$SA]+x}" ]; then
              checked_sa[$SA]=1
              ROLES=$(gcloud projects get-iam-policy "$GCP_PROJECT_ID" \
                --flatten='bindings[].members' \
                --filter="bindings.members:serviceAccount:$SA" \
                --format='value(bindings.role)' 2>/dev/null || echo "")
              if ! echo "$ROLES" | grep -q 'roles/artifactregistry.reader'; then
                echo "::error::Service account '$SA' (node '$node') lacks 'roles/artifactregistry.reader'. Grant: gcloud artifacts repositories add-iam-policy-binding $GAR_REPO --member=serviceAccount:$SA --role=roles/artifactregistry.reader"
                MISSING_ROLE=1
              fi
            fi
          done

          if [ "$MISSING_SCOPE" -ne 0 ] || [ "$MISSING_ROLE" -ne 0 ]; then
            exit 1
          fi
          echo "All swarm nodes have cloud-platform scope and roles/artifactregistry.reader."

  # ---------------------------------------------------------------------------
  # 5. deploy — IAP-SSH deploy. Runs on push (after build-push) AND on rollback
  #    dispatch (build-push skipped; uses inputs.image_tag). Hard-gated on a
  #    successful (exit 0) one-shot migration; the migrate service is always
  #    removed (if: always) so it never blocks a recovery deploy.
  # ---------------------------------------------------------------------------
  deploy:
    needs: [precondition-check]
    if: >-
      ${{
        !cancelled()
        && needs.precondition-check.result == 'success'
      }}
    runs-on: ubuntu-latest
    env:
      GCP_ZONE: ${{ vars.GCP_ZONE }}
      SWARM_MANAGER_NODE: ${{ vars.SWARM_MANAGER_NODE }}
      CLOUDSQL_CONNECTION: ${{ vars.CLOUDSQL_CONNECTION }}
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
      RUNTIME_DIR: ${{ runner.temp }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Generate and register CI SSH key (OS Login)
        run: |
          ssh-keygen -t rsa -N "" -f "$RUNTIME_DIR/gcp_ssh_key" -q
          gcloud compute os-login ssh-keys add --key-file="$RUNTIME_DIR/gcp_ssh_key.pub" || true

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Render stack locally (allow-listed envsubst)
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}" \
          CLOUDSQL_CONNECTION="${{ vars.CLOUDSQL_CONNECTION }}" \
          envsubst '${IMAGE_TAG} ${CLOUDSQL_CONNECTION}' \
            < docker-stack.yml.tmpl > docker-stack.yml
          echo "Rendered image refs:"
          grep -E 'image:' docker-stack.yml || true
          echo "Rendered CLOUDSQL connection (auth-proxy):"
          grep -E 'CLOUDSQL_CONNECTION|:5432' docker-stack.yml || true

      - name: Copy stack to manager (IAP)
        run: |
          gcloud compute scp docker-stack.yml "$SWARM_MANAGER_NODE":~/docker-stack.yml \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null"

      - name: docker stack deploy (idempotent — creates overlay + auth-proxy)
        run: |
          gcloud compute ssh "$SWARM_MANAGER_NODE" \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            -- "docker stack deploy -c ~/docker-stack.yml turbolog"

      - name: Wait for auth-proxy readiness (host-visible Swarm state only)
        run: |
          # HOST-VISIBLE state only — overlay DNS `auth-proxy` and the 9090
          # health port resolve ONLY inside turbolog-net containers; do NOT use
          # host-side `getent hosts auth-proxy` or `curl auth-proxy:9090`.
          gcloud compute ssh "$SWARM_MANAGER_NODE" \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            -- 'for i in $(seq 1 60); do n=$(docker service ps turbolog_auth-proxy --filter desired-state=running -q 2>/dev/null | wc -l); if [ "$n" -ge 1 ]; then echo "auth-proxy ready (running tasks: $n)"; exit 0; fi; sleep 5; done; echo "auth-proxy never reached running state" >&2; exit 1'

      - name: Launch one-shot migration (pre-clean + create, RUN_MIGRATIONS=false)
        run: |
          IMAGE="${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          echo "Migrate image: $IMAGE"
          # Pre-clean clears any stale turbolog-migrate from a prior failed run
          # so the fixed name never conflicts on a recovery deploy.
          gcloud compute ssh "$SWARM_MANAGER_NODE" \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            -- "docker service rm turbolog-migrate 2>/dev/null || true; docker service create --name turbolog-migrate -e RUN_MIGRATIONS=false --restart-condition=none --restart-max-attempts=0 --secret source=database_url_v1,target=database_url --network turbolog-net $IMAGE uv run alembic upgrade head"

      - name: Poll migration exit code (hard-gate, deploy proceeds only on exit 0)
        run: |
          gcloud compute ssh "$SWARM_MANAGER_NODE" \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            -- 'for i in $(seq 1 60); do t=$(docker service ps -q --filter desired-state=complete turbolog-migrate 2>/dev/null | head -1); if [ -n "$t" ]; then code=$(docker inspect "$t" --format "{{.Status.ContainerStatus.ExitCode}}" 2>/dev/null); code=${code:-2}; echo "migrate task=$t exit=$code"; if [ "$code" = "0" ]; then exit 0; else exit 1; fi; fi; sleep 5; done; echo "migration did not complete in time" >&2; exit 1'

      - name: Roll new image (backend + scheduler)
        run: |
          IMAGE="${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          echo "Rolling to $IMAGE"
          gcloud compute ssh "$SWARM_MANAGER_NODE" \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            -- "docker service update --image $IMAGE turbolog_backend && docker service update --image $IMAGE turbolog_scheduler"

      - name: Post-deploy smoke (expect 200 ready, 401 not 500 on /me)
        run: |
          set -uo pipefail
          READY=$(curl -sS -o /dev/null -w "%{http_code}" "https://${APP_DOMAIN}/api/health/ready")
          echo "/api/health/ready -> $READY"
          if [ "$READY" != "200" ]; then
            echo "::error::/api/health/ready did not return 200 — consider rollback."
            exit 1
          fi
          ME=$(curl -sS -o /dev/null -w "%{http_code}" "https://${APP_DOMAIN}/api/auth/me")
          echo "/api/auth/me -> $ME"
          # 401 is correct (unauthenticated). 5xx means a secret/DB wiring
          # failure the fail-fast assertion missed — flag for rollback.
          case "$ME" in
            5*) echo "::error::/api/auth/me returned $ME (5xx) — consider rollback."; exit 1 ;;
          esac
          echo "smoke OK"

      - name: Remove migrate service (always — never block recovery)
        if: always()
        run: |
          gcloud compute ssh "$SWARM_MANAGER_NODE" \
            --tunnel-through-iap --zone="$GCP_ZONE" \
            --ssh-key-file="$RUNTIME_DIR/gcp_ssh_key" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o UserKnownHostsFile=/dev/null" \
            -- "docker service rm turbolog-migrate 2>/dev/null || true" || true
