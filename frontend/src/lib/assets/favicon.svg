<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Degradé que representa el flujo de trabajo (Progreso a Completado) -->
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" /> <!-- Azul JIRA / Google -->
      <stop offset="100%" stop-color="#10B981" /> <!-- Verde Éxito / Done -->
    </linearGradient>
  </defs>

  <!-- Fondo oscuro para alto contraste en cualquier tema del navegador -->
  <rect width="32" height="32" rx="8" fill="#0F172A" />

  <!-- Anillo de progreso discontinuo (Representa las tareas diarias) -->
  <circle
    cx="16"
    cy="16"
    r="10"
    fill="none"
    stroke="url(#progressGrad)"
    stroke-width="3"
    stroke-dasharray="45 15"
    stroke-linecap="round"
    transform="rotate(-90 16 16)"
  />

  <!-- Rayo central (Representa la velocidad "Turbo") -->
  <path d="M17 9L11 17h5l-2 7 8-9h-5z" fill="#F59E0B" />
</svg>
